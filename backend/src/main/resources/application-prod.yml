# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:miniclaw}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.miniclaw: INFO
    org.hibernate.SQL: WARN

llm:
  default-model: ${LLM_DEFAULT_MODEL:deepseek:deepseek-chat}
  providers:
    - id: deepseek
      endpoint: ${DEEPSEEK_ENDPOINT:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      models:
        - ${DEEPSEEK_PRIMARY_MODEL:deepseek-chat}
        - ${DEEPSEEK_SECONDARY_MODEL:deepseek-coder}
    - id: openai
      endpoint: ${OPENAI_ENDPOINT:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      models:
        - ${OPENAI_PRIMARY_MODEL:gpt-4o-mini}
        - ${OPENAI_SECONDARY_MODEL:gpt-4.1}
