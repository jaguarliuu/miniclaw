spring:
  application:
    name: miniclaw
  
  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/miniclaw
    driver-class-name: org.postgresql.Driver
    username: miniclaw
    password: miniclaw123
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate  # 使用 Flyway 管理表结构，JPA 只验证
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# 服务端口
server:
  port: 8080

# LLM 配置
llm:
  # 从 4.9 开始，主线配置切换为多 Provider 结构
  # default-model 的格式是 providerId:modelName
  default-model: ${LLM_DEFAULT_MODEL:deepseek:deepseek-chat}
  providers:
    - id: deepseek
      endpoint: ${DEEPSEEK_ENDPOINT:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-key}
      models:
        - deepseek-chat
        - deepseek-reasoner
      multimodal-models: []
    - id: qwen
      endpoint: ${QWEN_ENDPOINT:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${QWEN_API_KEY:your-openai-key}
      models:
        - qwen3.5-plus
        - qwen3.5-flash
      multimodal-models:
        - qwen3-vl-plus
