# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/miniclaw
    username: miniclaw
    password: miniclaw123

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.miniclaw: DEBUG
    org.hibernate.SQL: DEBUG

llm:
  default-model: deepseek:deepseek-chat
  providers:
    - id: deepseek
      endpoint: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-key}
      models:
        - deepseek-chat
        - deepseek-reasoner
      multimodal-models: []
    - id: qwen
      endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY:your-qwen-key}
      models:
        - qwen3.5-plus
        - qwen3.5-flash
      multimodal-models:
        - qwen3-vl-plus
