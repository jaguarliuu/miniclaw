# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/miniclaw
    username: miniclaw
    password: miniclaw123

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.miniclaw: DEBUG
    org.hibernate.SQL: DEBUG

llm:
  default-model: deepseek:deepseek-chat
  providers:
    - id: deepseek
      endpoint: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-key}
      models:
        - deepseek-chat
        - deepseek-coder
    - id: openai
      endpoint: https://api.openai.com
      api-key: ${OPENAI_API_KEY:your-openai-key}
      models:
        - gpt-4o-mini
        - gpt-4.1
